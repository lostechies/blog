'262081530':
  - author: CraigCav
    date: '2010-03-21T22:02:09Z'
    depth: 0
    is_author: false
    message: <p>Hi Joshua,</p><p>I've struggled with similar repetitive mappings myself
      and hadn't achieved a way to make my conventions explicit, so I found this a really
      interesting read.</p><p>I'm really hoping that AutoMapper will soon be extended
      to natively support conventions to build mappings for type information, as although
      this work-around is much better than where we started, it still feels a little
      clunky.</p><p>I guess I'd like to be able to see full, easily testable, convention
      classes for MapViewUrls and MapDisplayValues, rather than extension methods off
      of IMappingExpression.</p><p>Another thing I'm thinking was that it took me longer
      than it should for me to figure out what was going on in the CreateMapsForSourceTypes
      method. Now, that might just be me being a little slow...but I couldn't figure
      out what the parameters were doing at a glance. I'm wondering if this method should
      be broken up into smaller chunks? Maybe something like:</p><p>cfg.ForSourceTypes(x
      =&gt; x.CanBeCastTo&lt;entity&gt;())<br>        .MapToDestinationType(sourceType
      =&gt; Type.GetType(typeof (ListItemMethodDTO).Namespace + "." + sourceType.Name
      + "DTO"))<br>        .CreateMaps(map, source, destination =&gt;  <br>        {  <br>            map.MapViewUrls(source,
      destination);  <br>            map.MapDisplayValues(source, destination);  <br>        });</p><p>What
      do you think?</p><p>The only other part that wasn't particularly clear (without
      looking at the implementation) was where exactly the source types were coming
      from.</p><p>Hmm...Reading my comment back I sound really critical, but actually
      I'm just excited to see where this is going. Keep up the good work.</p>
  - author: Joshua Flanagan
    date: '2010-03-22T04:30:10Z'
    depth: 0
    is_author: true
    message: "<p>I didn't read it as critical at all, its all valid feedback, and I
      pretty much agree with everything you said.<br>The truth is, I started to go down
      the path of a method-chained DSL, but it makes the implementation a lot more complicated.
      It wasn't worth the effort to solve my problem, since I saw it as a one-off solution.
      I know Jimmy is re-thinking some of the underlying infrastructure to enable a
      better solution for the next major version of AutoMapper. My solution is just
      some spackle to hold us over (which is also why I didn't propose it as a patch
      to AM). I posted it, not because the code is impressive, but to share the idea.</p>"
'262097341':
  - author: Andrew
    date: '2011-07-20T11:23:12Z'
    depth: 0
    is_author: false
    message: "<p>Hi,</p><p>Nice tutorial. I'm doing a similar thing by executing a git
      rev-parse command from within my msbuild script. Trouble is, it fails, saying
      'not a git repository' - which makes sense because TeamCity just checks out the
      files without creating a local repo (as far as I know). I was wondering if you
      encountered this and if so how you worked around it?</p><p>Thanks</p>"
  - author: joshuaflanagan
    date: '2011-07-20T12:28:23Z'
    depth: 1
    is_author: true
    message: <p>It sounds like you are using an old version of the jetbrains git plugin.<br>Either
      upgrade to the latest teamcity, or seek out the "community" git<br>plugin. If
      you use the community plugin, you have to select the option to<br>check out files
      on the agent, which is not the default. Best option is to<br>upgrade.</p>
