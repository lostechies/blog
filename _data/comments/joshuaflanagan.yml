  - author: joshuaflanagan
    date: '2012-08-24T13:11:10Z'
    depth: 1
    is_author: true
    message: <p>This article is now out of date. I discovered the same problem recently.
      The cookie now comes through as "fbsr_#{@fb_app_id:disqus }", and I think it is
      intended to be used in a different way. See some discussion here: <a href="http://stackoverflow.com/questions/7206204/new-js-sdk-with-oauth-2-0-saving-subdomain-in-fbsr-cookie"
      title="http://stackoverflow.com/questions/7206204/new-js-sdk-with-oauth-2-0-saving-subdomain-in-fbsr-cookie"
      rel="nofollow noopener">http://stackoverflow.com/qu...</a></p><p>I will update
      this article with a warning.</p>
  - author: Shogo
    date: '2012-08-25T06:20:15Z'
    depth: 2
    is_author: false
    message: '<p>Thanks for the warning Joshua.  Are you planning to move to one of
      the various 3rd party ruby sdks listed on:  <a href="https://developers.facebook.com/tools/third-party-sdks/#ruby"
      title="https://developers.facebook.com/tools/third-party-sdks/#ruby" rel="nofollow
      noopener">https://developers.facebook...</a></p><p>I''m not sure if any of them
