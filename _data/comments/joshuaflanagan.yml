    date: '2010-11-26T10:36:37Z'
    depth: 0
    is_author: false
    message: "<p>The described approach seems useful for a single one or only few binary
      files in conflict. How can this approach be efficiently used with a large number
      of binary files in conflict distributed in a large tree mixed with text files?</p>"
  - author: Skydiver
    date: '2012-11-11T21:27:49Z'
    depth: 0
    is_author: false
    message: "<p>git status --porcelain | sed -r -e 's/...(.*)/git checkout --theirs
      .\\/\\1/' &gt;../tmp<br>mv ../tmp .<br>./tmp<br>rm tmp</p><p>this work's for me.</p>"
  - author: Richard
    date: '2013-06-28T15:18:59Z'
    depth: 0
    is_author: false
    message: "<p>When trying to resolve a binary conflict that occurred during a git
      rebase, I use</p><p>git rebase master -s recursive -X theirs, which will favour
      the checked out branch's changes (IE, not master's changes) when resolving conflicts.</p>"
