'262113226':
  - author: Benjamin Smith
    date: '2009-12-20T00:29:35Z'
    depth: 0
    is_author: false
    message: '<p>I have a take: break up the string into variables that describe their
      intention. For example, parsing a log file might look like this:</p><p>$year =
      "([0-9]{4})"; <br>$month="([0-9]{2})"; <br>$day="([0-9]{2})"; <br>$message="(.*)";
      <br>$match="/$year\.$month\.$day $message/";</p><p>This produces something that''s
      easy to understand, and breaks up the expression into chunks that can be easily
      added/removed from $match so that diagnosing a pattern failure is easy.</p>'
  - author: Siderite
    date: '2009-12-21T09:04:46Z'
    depth: 0
    is_author: false
    message: <p>You might want to check my project <a rel="nofollow noopener">http://regexconverter.codeplex.com/</a>
      that isomorphically transforms regex expressions into XML. It was my way of transforming
      regular expressions into something that is more humanly readable and, eventually,
      can be XSLTed into another regex.</p><p>I also think Benjamin's solution is valid,
      although I could never make it work in a usable way. I would create subpatterns
      and use them in a regular expression like this:<br>var $int=@"-?\d+";<br>var match=@"{$int/hour}-{$int/minute}-{$int/second}".
      But it still isn't modular enough for me.</p>
  - author: William Wegerson
    date: '2009-12-28T23:19:02Z'
    depth: 0
    is_author: false
    message: "<p>As much as I love regex, as you do no doubt, sometimes the patterns
      get intense. Hence commenting as you pointed out can be a time saver in trying
      to decipher the <i>intent</i> of the pattern not only for someone else but ourselves
      as we go back to older patterns. Good article.</p>"
