  - author: spagbol
    date: '2015-03-27T04:11:43Z'
    depth: 0
    is_author: false
    message: "<p>I rarely comment on blogs, but this article is FANTASTIC!!!</p><p>Please
      understand, I don't say that lightly; you really have written an excellent article
      for noobs, especially clarifying the confusing green label thingies as branches
      - I now realise they are just pointers to timestamps, so can dance around vertically
      depending on the commit time.</p><p>I realised my project needed source control
      as I always copied releases into new folders on my hard-drive like v1.0 and then
      copying the whole thing into v1.1, etc...messy.</p><p>I then tried tortoise SVN
      and thought it was great, but it was annoying having to right-click all the time,
      so I found TortoiseTG (Mercurial)...I though wow, that's exactly what I wanted,
      it has a nice GUI app where I can see development and clone repos.</p><p>But as
      time passed, I realised branches are permanent and the lines were all over the
      place. I felt like I was going backwards :(</p><p>I then forced myself to try
      GIT GUI but was initially reticent as it's GUI was rubbish compared to TortoiseHG.
      When I tried branches, it had the same problem where lines were all over the place
      when I created branches and then merged.</p><p>I refuse to use the terminal and
      the GUI doesn't allow you to rebase. I found an SO answer by using Tools-&gt;Add-&gt;git
      rebase master.</p><p>Boom, branches disappeared and it unleashed the power of
      encapsulated branch development, i.e. you branch, do stuff, do some more stuff
      and then rebase it back into master without any messy branch lines.</p><p>GIT
      is far superior to any other SVC because you can delete a branch and do this rebase
      stuff as Traumflug mentioned in the comments.</p><p>Thank you again Joshua, you
      have given me the power of version control.</p>"
