  - author: joshuaflanagan
    date: '2012-08-25T14:40:06Z'
    depth: 3
    is_author: true
    message: <p>I did not update to use a 3rd party SDK. I only needed to make a few
      changes to my code:</p><p>cookie = request.cookies["fbsr_#{@fb_app_id}"]</p><p>fb_info
      = JSON.parse(urldecode64(cookie.split('.',2)[1]))</p><p>def urldecode64(str)<br>  encoded_str
      = <a href="http://str.tr" title="str.tr" rel="nofollow noopener">str.tr</a>('-_',
      '+/')<br>  encoded_str += '=' while !(encoded_str.size % 4).zero?<br>  Base64.decode64(encoded_str)<br>end</p><p>def
      valid_cookie?<br>  return false unless cookie<br>  return false if fb_info['algorithm'].to_s.upcase
      != 'HMAC-SHA256'<br>  encoded_sig, payload = cookie.split('.', 2)<br>  sig = urldecode64(encoded_sig)<br>  expected_sig
      = OpenSSL::HMAC.digest('sha256', settings.fb_app_secret, payload)<br>  expected_sig
      == sig<br>end</p>
