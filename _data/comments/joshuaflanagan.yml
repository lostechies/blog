       There is one root project which consumes the rest of the projects in the core
      so I can create a nuget pkg for that and include &lt;files&gt; for the rest of
      the dlls.  But what if I want the source ( symbols ) should I do as you illustrate
      here<br> &lt;file src="..\..\src\Bottles\**\*.cs" target="src"/&gt;<br>but for
      all the projects? Like <br> &lt;file src="..\..\src\proj1\**\*.cs" target="src"/&gt;<br>
      &lt;file src="..\..\src\proj2\**\*.cs" target="src"/&gt;<br> &lt;file src="..\..\src\proj3\**\*.cs"
