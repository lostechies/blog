  - author: Joshua Flanagan
    date: '2009-02-05T01:25:44Z'
    depth: 0
    is_author: true
    message: "<p>@Jake - I couldn't say if AutoMocking is one of the barrier words that
      Scott was referring to. But I don't think it matters in the context of this post,
      as I had a different target audience in mind than what he was referring to. I
      targeted developers who are already familiar with, and using a mocking framework,
      but a little skeptical of automocking.</p>"
  - author: Joshua Flanagan
    date: '2009-02-05T01:35:07Z'
    depth: 0
    is_author: true
    message: "<p>@David - I can't speak for the Windsor-based AutoMockingContainer.
      The StructureMap RhinoAutomocker always creates mocks using the DynamicMock()
      method. If you need a specific fake to be a stub or static mock, you can manually
      create it and then use the Inject() method on the automocker so it knows to use
      it (works for concrete classes as well).</p>"
  - author: Joshua Flanagan
    date: '2009-02-05T01:39:12Z'
    depth: 0
    is_author: true
    message: "<p>@Michael - it could be. But I'm comfortable assuming that any truly
      worrisome design smell will expose itself in a more impactful way than the automocker
      could disguise.</p>"
  - author: Brian
    date: '2009-02-06T23:42:17Z'
    depth: 0
    is_author: false
    message: "<p>The one thing I have to say that auto-mocking does to the negative,
      and IoC in general, is for new people coming in there is a lot of 'magic' that
      they have to figure out that they have no tests to look to for guidance and have
      been simply stuck going through individual classes and going 'oh...there an overloaded
      constructor with a different/second argument type).</p><p>Not saying I disagree,
      just saying that's one of the problems I've seen people have, most I've worked
      with want to 'see it work'.</p>"
