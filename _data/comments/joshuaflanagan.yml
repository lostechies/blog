'262046146':
  - author: Kevin Kuebler
    date: '2010-09-04T14:13:42Z'
    depth: 0
    is_author: false
    message: "<p>Thanks for this series - this is really helpful. I've seen these types
      of gitk screenshots before but didn't really understand what was going on. Your
      explanations are very clear. I feel like I actually have a basic understanding
      of git now. Thanks!</p><p>Kevin</p>"
  - author: George
    date: '2010-09-04T16:16:50Z'
    depth: 0
    is_author: false
    message: <p>Great clear explanation, thanks, but there's still points that confuse
      the hell out me. Particularly the confusion between "master" in the local repository
      and "master" on origin. For example:<br>d:\code\gitk-demo&gt;git merge origin/master</p><p>If
      you had renamed your local master to "mymaster", would that line become:<br>d:\code\gitk-demo&gt;git
      merge origin/mymaster</p><p>... or is origin/master the name of the remote thing,
      and it merges with your current branch which is not specified in the command?</p>
  - author: Joshua Flanagan
    date: '2010-09-05T23:52:18Z'
    depth: 0
    is_author: true
    message: <p>@George Your second understanding is correct. If I had renamed my local
      master, the line would still be:</p><p>d:\code\gitk-demo&gt;git merge origin/master</p><p>Because
      the name of the remote reference is still "origin/master". origin/master is a
      single argument in the merge command, indicating the source reference to merge
      into the current branch.</p><p>However, if you want to push your local mymaster
      changes to the remote origin/master, you would need to specify the source and
      destination explicitly, since they do not match:</p><p>git push origin mymaster:master</p>
  - author: Krishnan Mahadevan
    date: '2010-12-01T04:07:42Z'
    depth: 0
    is_author: false
    message: "<p>I must admit, this was like an eye opener for me. I have been feeling
      like a dog trying to catch its own tail, with respect to my effort in understanding
      GIT. The one best thing I liked about your post, was you helped me clear out this
      confusion of visualizing the GIT branches as actual branches. The concept of branches
      being mere labels solved a lot of puzzles ! Awesome Post Joshua...</p><p>One quick
      question. Which of the following would you advocate, if I were to ensure that
      my developer branch is in sync with origin/master</p><p>1. git fetch<br>2. git
      checkout master<br>3. git rebase origin/master<br>4. git checkout mydeveloperbranch<br>5.
      git rebase master</p><p>(or)<br>1. git fetch<br>2. git checkout mydeveloperbranch<br>3.
      git rebase origin/master</p><p>My assumptions here are:<br>I will only work on
      developer branch, which means my master branch is basically dummy, and I deliver
      code as branches to the remote and an admin group takes care of merging the contents
      of my dev branch to the origin/master.</p>"
  - author: Joshua Flanagan
    date: '2010-12-01T04:49:24Z'
    depth: 0
    is_author: true
    message: "<p>@Krishnan - Thinking of branches as labels was a big breakthrough for
      me too - I'm glad I was able to convey the idea to help you.</p><p>If you really
      have no need for your local master branch (and I can't think of any off the top
      of my head), I say skip it and use the second workflow you proposed.</p>"
  - author: Jonathan Hartley
    date: '2011-01-04T13:42:15Z'
    depth: 0
    is_author: false
    message: "<p>Thanks for the post! Really helped me get a few things straight. Shine
      on.</p>"
  - author: Jonathan Hartley
    date: '2011-01-04T15:44:11Z'
    depth: 0
    is_author: false
    message: "<p>Hey. If anyone has any clues to the following, I'd much appreciated
      it. I'm trying this out in my own (real work) repo:</p><p>Instead of using 'fetch'
      then 'merge' as shown above, at work we're in the habit of just using a single
      'git pull origin master'.</p><p>My approximate understanding was that this is
      equivalent, but I think I must be wrong about that.</p><p>I have a local clone
      of our shared repo. I created a couple of local feature branches. Then I want
      to get updates from the shared repo. So I 'checkout master'. Instead of doing
      a 'fetch origin' followed by a merge, I did a 'pull origin master', which I understood
      to be a simple combination of the fetch &amp; merge.</p><p>I ended up with gitk
      showing me:</p><p>o [master]<br> |<br>o recent commits made by my workmates<br>
      |<br> | o [my local feature branch 1]<br> |  |<br> | /<br> | o [my local feature
      branch 2]<br> |  |<br> | /<br>o [remotes/origin/master]<br> |</p><p>So I have
      successfully fetched the recent changes from my workmates, and applied them to
      my local master, which is good. But I don't understand why my remote origin/master
      branch has not been moved up to the same commit as my local master.</p><p>If I
      do as Joshua instructs, and now perform a fetch, then the remote origin master
      branch catches up to my local master. Can anyone explain why the fetch does that,
      but the pull does not?</p>"
  - author: Joshua Flanagan
    date: '2011-01-04T16:04:24Z'
    depth: 0
    is_author: true
    message: "<p>@Jonathan - Yes, this is a known behavior. I don't know if its a bug
      or intentional, but we have stubbed our toe on it a number of times. The key is
      to NOT specify the branch when doing a pull.</p><p>If you just do 'git pull origin',
      everything will work as you expect - your remote pointer be updated.</p><p>If
      you find out a good explanation, let us know.</p>"
  - author: Jonathan Hartley
    date: '2011-01-04T17:33:46Z'
    depth: 0
    is_author: false
    message: "<p>Alright, thanks for the reassurance that I'm not *totally* bungling
