  - author: Lars-Erik Roald
    date: '2011-01-24T20:29:00Z'
    depth: 0
    is_author: false
    message: "<p>I am sorry, but I don't like this. You are doing the 'sensitivity filtering'
      at the wrong abstraction level. It is not a concern of the data acces layer. It
      is very CRUD-ish. I would rather have domainService returning ISensitiveDto or
      IRestrictedDto. I also think that queries dont belong in the presentation layer
      - specifications that are entity-agnostic are better. The serviceA could retrieve
      a list of IServiceASpecifications.</p>"
  - author: Joshua Flanagan
    date: '2011-01-24T20:53:22Z'
    depth: 0
    is_author: true
    message: "<p>@Lars-Erik - IDataRestrictions are not part of the data access layer.
      They are part of the domain and can be leveraged by different parts of the application
      - including data access, as demonstrated here. In a follow up post I will demonstrate
      how these same data restrictions defined in the domain can be used to authorize
      access to URLs - nothing to do with data access.</p>"
  - author: Lars-Erik Roald
    date: '2011-01-24T21:50:24Z'
    depth: 0
    is_author: false
    message: "<p>I see. Looking forward to next post.</p>"
