'626612787':
  - author: jakcharlton
    date: '2012-03-28T03:56:11Z'
    depth: 0
    is_author: false
    message: <p>Aren't you trying to recreate built in logic?</p><p>url_for [@project,
      @comment]</p><p><a href="http://ryanbigg.com/2012/03/polymorphic-routes/" title="http://ryanbigg.com/2012/03/polymorphic-routes/"
      rel="nofollow noopener">http://ryanbigg.com/2012/03...</a></p><p></p>
  - author: joshuaflanagan
    date: '2012-03-28T04:07:24Z'
    depth: 1
    is_author: true
    message: "<p>I don't know, I'm asking you!<br>But the example you provided and linked
      to is NOT a solution to my problem. You know that you have a comment, so you know
      you have to also pass a post to get the url. I'm referring to a situation where
      you don't know what the model is. The problem I'm trying to solve is when you
      have generic code that needs to be able to handle any model, and generate a url.</p>"
  - author: jakcharlton
    date: '2012-03-28T04:11:29Z'
    depth: 2
    is_author: false
    message: "<p>In what example wouldn't you know what the model was?</p><p>Your solution
      knows, you just moved it into a helper</p><p>If (and I have no idea why you would
      want to) you wanted to avoid knowing what the parent object was, you could just
      implement a method on comment and use that</p><p>class Comment<br> def parent<br> 
        post<br> end<br>end</p><p>url_for [@comment.parent, @@comment:disqus ]</p><p></p>"
  - author: joshuaflanagan
    date: '2012-03-28T04:19:01Z'
    depth: 3
    is_author: true
    message: "<p>The *call site* does not know the model. Yes, somewhere in my application,
      that knowledge exists (the config/initializer). But the point at which I need
      to generate a URL, I do not know the model. <br>I have a method that returns a
      collection of models. Models of different types. I want to display a list of links
      to those models. The code that iterates over the models doesn't know, and shouldn't
      have to care, what the models actually are. It just wants to ask Rails for their
      URL. That is what url_for is supposed to do. But it doesn't in some circumstances,
      like nested resources.</p>"
  - author: jakcharlton
    date: '2012-03-28T04:28:31Z'
    depth: 4
    is_author: false
    message: <p>Then ask the model</p><p>class Comment<br>  def url    <br>      ...
      whatever ... <br>   end<br>end</p><p>Personal opinion, I really dislike your current
      solution - overly complicated for a really simple thing </p><p>Your assertion
      that "This is what url_for is supposed to do" is just wrong. There is a well founded
      presumption that the view knows the properties model structure it is displaying
      (as you would for knowing the fields for a form for example).</p><p>If your view
      is that generic that it is only asking about a few properties of a model via a
      protocol (say "title" and url link), then implement a method as in the class above
      - models that implement this protocol can be displayed</p>
  - author: joshuaflanagan
    date: '2012-03-28T04:45:36Z'
    depth: 5
    is_author: true
    message: "<p>Thanks for your feedback, Jak. I didn't intend this as a patch submission
      to Rails, so I don't need everyone to like it. Personally, putting the url generation
      on the model (which is how we started) was hard for me to stomach. To each his
      own.<br>Wrapping each model in a decorator again presumes that you know the model
      type (I think) so that you know which decorator to wrap it with. I haven't used
      Draper yet, but I do agree with its intent. If it has a way to generically wrap
      a model with the correct decorator, without you explicitly telling it which decorator
      to use, it may be a possible solution.</p>"
  - author: jakcharlton
    date: '2012-03-28T04:51:10Z'
    depth: 6
    is_author: false
    message: "<p>If you can use a model of any kind, you can use Draper - it just decorates
      other models and you just replace their use with its decorator</p><p>If your models
      are just conforming to one generic model, then just create a view model for that
      use case, which has the generic properties to display, and the url to go to</p><p></p>"
  - author: jakcharlton
    date: '2012-03-28T04:30:11Z'
    depth: 4
    is_author: false
    message: <p>And if you don't like the idea of using a view only property in your
      model, you should probably be using view models anyway, I suggest Draper, where
      you can then implement view only logic about models<br><a href="https://github.com/jcasimir/draper"
      title="https://github.com/jcasimir/draper" rel="nofollow noopener">https://github.com/jcasimir...</a><br></p>
  - author: Mark IJbema
    date: '2012-03-28T09:08:59Z'
    depth: 0
    is_author: false
    message: "<p>If you have a lot of models this becomes quite expensive though. As
      far as I can see the lookup is O(n). If your primary usecase is checking the model
      class, wouldn't it be better to store the mappings in a hash, so that lookup is
      constant? (and then per class you could possibly still do another check, if you
      need to check other stuff than the model class)</p>"
  - author: joshuaflanagan
    date: '2012-03-28T12:27:20Z'
    depth: 1
    is_author: true
    message: <p>First, its worth pointing out that I only need to register handlers
      for the "special case" models. Everything else just falls through to url_for.<br>The
      predicate approach gives me more flexibility, but it is possible I won't need
      its full power. The class checking will likely be the most common case. Another
      possibility would be a hybrid approach - first check a hash for the class of the
      model. If it not found there, check the model against the collection of predicates,
      and only after that fails, fall through to url_for.</p>
  - author: p373
    date: '2015-12-31T04:12:41Z'
    depth: 0
    is_author: false
    message: <p>I agree with the intent here. The solution seems a bit complex though.
      In any case, looks like this is now baked into Rails <a href="http://api.rubyonrails.org/classes/ActionDispatch/Routing/PolymorphicRoutes.html"
      title="http://api.rubyonrails.org/classes/ActionDispatch/Routing/PolymorphicRoutes.html"
      rel="nofollow noopener">http://api.rubyonrails.org/...</a></p>
  - author: Emerson
    date: '2019-09-25T03:53:25Z'
    depth: 0
    is_author: false
    message: '<p>Had the same issue today and fixed by creating named route: get "/posts/:post_id/comments/:id",
      to: ''posts/comments#show'', as: :comment</p><p>That would instruct Rails to respond
      to your "comment_path"</p>'
