  - author: Martin Pecka
    date: '2014-05-20T11:39:56Z'
    depth: 0
    is_author: false
    message: <p>Really nice tutorial. However, I have a comment regarding the usage
      of rebase. If you write "Anyone that pulls down the repository will see a completely
      linear history", that's not true regarding the time of the commits.</p><p>That
      might be confusing, since when I e.g. rebased a month old branch on top of our
      master, people could get confused why the newest commit is a month old when they
      committed and pushed yesterday.</p><p>From this reason, I think using rebase is
      also not so good as you show it here.</p>
  - author: Traumflug
    date: '2014-06-13T22:06:45Z'
    depth: 1
    is_author: false
    message: '<p>It''s even better. Rebasing makes sure a merge actually applies cleanly
      to the other branch.</p><p>Think of more complex projects where branches have
      diverged quite a bit. Merges wouldn''t be successful, a lot of conflicts would
      have to be solved at once. If you rebase an older topic branch one commit by another,
      you can resolve conflicts in small chunks and test each intermediate result.</p><p>Later
      you''ll recognize cherry-pick, which allows to copy commit by commit from one
      branch to another. This way reviewing becomes more powerful: the reviewer picks
      commits and can test each intermediate result. Or pick only the better parts of
      a branch. If you pick over a bunch of commits and rebase the topic branch without
      merging, the topic branch will shrink accordingly, showing much better what''s
      left.</p><p>These are techniques which simply weren''t possible with Subversion
      &amp; Co.. They open new horizons, merging (error prone, difficult to bisect later)
      is entirely gone in my workflow.</p><p>A project of mine is <a href="https://github.com/Traumflug/Teacup_Firmware"
      title="https://github.com/Traumflug/Teacup_Firmware" rel="nofollow noopener">https://github.com/Traumflu...</a>
      . Linear history for 3 years and several hundred commits now. And a lot of topic
      branches spinning off, one for each bug report, one for each contribution, one
      for each experimental implementation. These topic branches get rebased and rebased
      again to follow development of master. Eventually they become empty and disappear,
      because all of it was picked to master.</p><p>Having the opportunity to unleash
      such powers should make it easy to get used to non-linear date stamps. Code development
      isn''t linear either, after all, people work in parallel, delay things and pick
      them up later.</p>'
