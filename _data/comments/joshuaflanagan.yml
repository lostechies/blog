      of when you would want to do this? Would you expect to invoke an entirely different
      action depending  on the request? Or are you always executing the same action,
      with the same output model, and you just want to format it differently? If I can
      better understand the need, I might be able to put together a post on how to do
      it with Fubu.</p>
  - author: Jamie
    date: '2010-01-20T15:34:23Z'
    depth: 0
    is_author: false
    message: <p>What I meant was essentially returning different "views" of the same
      model based on file extension or some header info, but using the same action.  So
      for example /security/signin would return full view of login widget with layout,
      /security/signin.json might return just data for an Ajax call, but they use the
      same action returning the same model.</p>
