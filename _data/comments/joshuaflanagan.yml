'262113273':
  - author: Nadav
    date: '2011-02-06T11:14:42Z'
    depth: 0
    is_author: false
    message: "<p>Reqarding the ToLocal/ToUniversal functions,<br>I've found that the
      ConvertTime To/From UTC throws exceptions if the Kind of the DateTime is not as
      it expects.<br>Now, for ConvertTimeFromUtc it throws if the Kind!=UTC which is
      not a big suprise,<br>But ConvertTimeToUtc requires that the Kind will be Unspecified
      which I found a bit of a suprise.</p>"
  - author: Joshua Flanagan
    date: '2011-02-06T15:50:59Z'
    depth: 0
    is_author: true
    message: <p>@Nadav - great point. The trick is in understanding what DateTimeKind.Local
      means. It does not mean "not UTC". It specifically means "in the timezone of the
      current system".</p><p>We do not want our application to have any dependency on
      the timezone of the current system, so we _never_ have a DateTime with Kind=Local.
      The only way you would have a DateTimeKind=Local is if you used DateTime.Now.
      When building a server application that needs to support multiple time zones,
      always use DateTime.UtcNow. When you convert a UTC time to a "local" time with
      TimeZoneInfo.ConvertTimeFromUtc and an arbitrary TimeZoneInfo, the resulting time
      has Kind=Unspecified, which will happily convert back to UTC with ConvertTimeToUtc.</p>
  - author: Martin Sykora
    date: '2011-04-03T22:17:29Z'
    depth: 0
    is_author: false
    message: "<p>I liked your post, and I hope my comment is not too naive but I wonder
      what about Daylight savings time? So for example right now the UTC and GMT time
      in Britain differ by +1 hour since the United Kingdom is in BST (Summer savings
      time)...</p><p>Does the TimeZoneInfo class account for that?? ...or is more logic
      necessary here.. I guess I'll try it when I have more time, but if you know, this
      would be usefull to point out here I think.</p><p>thanks,<br>Martin</p>"
