'262100433':
  - author: benb
    date: '2009-04-28T17:49:31Z'
    depth: 0
    is_author: false
    message: "<p>to me this is a bug. It is one I submitted last year for MVC and never
      has been resolved. The problem is, when one is trying to make a RESTful service
      (as an example), ALL valid characters as defined by the standard should be acceptable.</p><p>What
      I found is, basically any character that is not valid for a Windows file name
      causes this issue. With routing, this is a bug. Given we are not looking for a
      specific disk file, all protocol standard characters should be considered valid.
      When looking at something like the Yahoo! Boss API, with MVC or anything on ASP
      .NET, you would not be able to pass in the query in the same way? Why? This is
      not correct as it does not work the way it should and the way the standards say
      it should.</p>"
  - author: Ben
    date: '2009-05-15T12:03:29Z'
    depth: 0
    is_author: false
    message: <p>Totally agree with benb's assesment.</p><p>We use custom URL rewriting
      in <a href="http://asp.net" title="asp.net" rel="nofollow noopener">asp.net</a>
      2.0 (not MVC routing) precisely so we don't have to use ugly URLs like :</p><p>http://localhost/dovetailcrm/contacts/query?search=%25%20%25</p><p>This
      is a bug. For us a really really annoying one.</p>
  - author: Joshua Flanagan
    date: '2009-05-15T13:40:41Z'
    depth: 0
    is_author: true
    message: <p>First, whether its a bug or not doesn't really matter to me. I'm merely
      providing info on 2 different ways to deal with it (by changing the framework
      behavior, or working around it).<br>Second, its hard to call it a bug with MVC,
      since none of the MVC code is causing the problem - its in the underlying ASP.NET
      layer.<br>Third, I think I'd classify it as "default behavior that you disagree
      with". The framework was designed to operate in 2 modes  "allow those characters
      in the path", or "dont allow those characters in the path", with documented ways
      to change the mode. They chose "dont allow" as the default mode, but you can change
      it if you disagree (by following the KB articles linked in the Dirk.Net post mentioned
      above).<br>Fourth, yes its really annoying!</p>
