      my root and the rest of them consume each others pkgs?  some how the latter seems
      messy and the former seems hacky. <br>does this make any sense?  <br>Thanks,<br>Raif</p>
  - author: lucent6408d
    date: '2016-04-11T18:12:15Z'
    depth: 0
    is_author: false
    message: "<p>hi guys, I'm new to all of NuGet and chocolatey so let me ask as question.
      if I choose to go with a private feed or nugget server and set up a few packages
      in there, like flash ver 20 and then adobe releases ver21. How do I do about updating
      those packages whenever a new version is released? is there a way to automate
      that or do I have to open the nuspec file and manually update it with the new
      URL to the new version?... pls help :)</p>"
  - author: Lucian
    date: '2016-06-17T14:32:35Z'
    depth: 0
    is_author: false
    message: <p>How does your VERSION solution work with nuget versions like "1.0.0-alpha"?
      This hyphen-prefix convention is an important part of nuget, but absent from things
      like [AssemblyVersion].</p>
  - author: Ben Lewies
    date: '2017-05-04T10:07:33Z'
    depth: 1
    is_author: false
    message: "<p>Hi @ljw1004:disqus</p><p>If you use GitFlow / GitHubFlow, take a look
      at GitVersion.  You can add it as a task in your build pipeline, and it will render
      a SemVer compliant version number  based on the branch name and tag for your build
      - as far as I know GitVersion is available on VSTS and TeamCity.  You can also
      let it set your asseblyversion environment variable and subsequently use the assemblyversion
      environment variable in your nuspec files to set your package version metadata.</p><p>AFAIK
      the default scheme it implements will apply appropriate labels for all unstable
      package versions, but you have the option of configuring the scheme to your liking.</p><p>I
      hope this answers your question.</p>"
'341371739':
  - author: ray2k
    date: '2011-06-26T15:07:22Z'
    depth: 0
    is_author: false
    message: <p>top-of-my-head powershell version, save as nunit.ps1 in root directory<br>$filename
      = $args[0]$scriptDir = [System.IO.Path]::GetDirectoryName($myInvocation.MyCommand.Definition)$packagesDir
      = Join-Path $scriptDir "source\packages"$exePath = dir $packagesDir -recurse |
      where { $_.PSIsContainer -eq $false -and $_.Name -eq $filename } | foreach { $_.FullName
      } | sort -descending | select -first 1$argString = ""for($count = 1; $count -lt
      $args.Length; $count++){    $argString = $argString + $args[$count]}$cmdline =
      $exePath + " " + $argStringInvoke-Expression $cmdline</p><p>Then your build can
      call powershell.exe full-path-to-nunit.ps1 nunit-console.exe arg1 arg2 arg3 '`"arg
      with spaces`"'<br>Probably a billion ways to do this. Thanks for occupying my
      Sunday morning :)</p>
  - author: Mark
    date: '2012-12-18T20:26:38Z'
    depth: 0
    is_author: false
    message: <p>I found an easier fix. Apparently 'CD" does work with wildcards. So
      in your build event you do:<br>CD "$(SolutionDir)packages\MyAwesomeTool*\tools"<br>CALL
      MyAwesomeTool.cmd<br></p>
  - author: Frederic Malenfant
    date: '2018-04-13T19:19:28Z'
    depth: 1
    is_author: false
    message: <p>Wow, 5 years ago... and you have my solution!  We need to run post-build-events
      to the "latest" nuget of typescript, and your "cd wildcard" solution still do
      the job, even in visual studio 2017! Thank you.</p>
  - author: Roman Baeriswyl
    date: '2017-06-02T07:42:42Z'
    depth: 0
    is_author: false
    message: <p>Just stumbled uppon this. It is even easier if you pass "-ExcludeVersion"
      to the nuget.exe command. With that, the version number is not part of the path
      anymore and therefore is very static.</p>
