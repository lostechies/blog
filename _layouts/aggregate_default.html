<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>

    <section>
      <div>
        <div class="container" style="margin-top:31px;">
          <a href="{{ site.url }}"><img src="{{ site.baseurl }}/assets/images/lostechies_logo.png"/></a>
        </div>
      </div>
    </section>

    <div class="main-container" style="margin-top:15px;">
      <div class="tile is-ancestor is-vertical">


        <nav class="navbar has-shadow" role="navigation" aria-label="main navigation">

          <div class="navbar-brand">

            <a href="{{ site.baseurl }}/" class="navbar-item">
              <span class="icon">
                <i class="fa fa-home" aria-hidden="true" title="Homepage"></i>
              </span>
            </a>

            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu" id="nav-toggle">
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
            </a>

          </div>

          <div id="navMenu" class="navbar-menu">

            <div class="navbar-start">

              <div class="navbar-item" id="searchFieldNav">
                <div class="field has-addons">
                  <p class="control">
                    <input class="input is-small" type="text" placeholder="Find an article" id="search-text">
                  </p>
                  <p class="control">
                    <a class="button is-dark is-small" onclick="searchHandler();">
                      Search
                    </a>
                  </p>
                </div>
              </div>

            </div>

            <div class="navbar-end">
              <a href="{{ site.baseurl }}/about" class="navbar-item">About</a>
              <a href="{{ site.feed.path }}" class="navbar-item"><img src="{{ site.baseurl }}/assets/images/rss.png"/></a>
            </div>

          </div>

        </nav>

        <div class="tile is-parent">
          <div class="tile is-8 is-child main">

            {{ content }}

          </div>

          <div class="tile is-4 is-child">
            <div class="tile is-parent is-vertical sidebar">

              <div id="recentAuthorPostsContainer" class="tile is-child widget">
                <div class="card">
                  <header class="card-header">
                    <p class="card-header-title nice-title">
                    Recent Author Posts
                    </p>
                  </header>
                  <div class="card-content">
                    <div class="content nice-text">
                      <ul id="recentAuthorPosts"></ul>
                    </div>
                  </div>
                </div>
              </div>

              <div class="tile is-child widget">
                <div class="card">
                  <header class="card-header">
                    <p class="card-header-title nice-title">
                    Recent Site Posts
                    </p>
                  </header>
                  <div class="card-content">
                    <div class="content nice-text">
                      <ul id="recentPosts"></ul>
                    </div>
                  </div>
                </div>
              </div>

              {% include authors.html %}

            </div>
          </div>
        </div>
      </div>
    </div>

    {% include footer.html %}

    <!-- js -->

    {% if page.aggregated == true %}
    <script src="{{ site.baseurl }}/assets/js/load-aggregate-posts.js"></script>
    {% endif %}
    <script src="{{ site.baseurl }}/assets/js/load-recent-author-posts.js"></script>

    <script>
      {% assign col = site.collections | where: 'label', page.collection | first %}
      var page_collection = "{{page.collection}}";
      var collectionFeed = "{{col.feed}}";
      var collection = collections.find(function(col) {
        return col.label === "{{col.label}}";
      });

      {% if page.aggregated == true %}
        loadAggregatePosts("posts", collectionFeed, true, collection);
      {% endif %}

      loadAuthors("authors");
      loadRecentPosts("recentPosts");
      loadRecentAuthorPosts("recentAuthorPosts", "recentAuthorPostsContainer");
    </script>

    <!-- page scripts -->
    {% if layout.scripts %}
    {% include {{layout.scripts}} %}
    {% endif %}

  </body>
</html>
