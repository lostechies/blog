<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>

    <section>
      <div>
        <div class="container" style="margin-top:31px;">
          <a href="{{ site.url }}"><img src="{{ site.baseurl }}/assets/images/lostechies_logo.png"/></a>
        </div>
      </div>
    </section>

    <div class="main-container" style="margin-top:15px;">

      {% include nav.html %}

      <div class="columns">
        <div class="column is-8 main">

          {{ content }}

        </div>

        <div class="column is-4">
          <div class="sidebar">

            <div class="widget">
              <div class="card">
                <header class="card-header">
                  <p class="card-header-title nice-title">
                  Recent Posts
                  </p>
                </header>
                <div class="card-content">
                  <div class="content nice-text">
                    <ul id="recentPosts"></ul>
                  </div>
                </div>
              </div>
            </div>

            {% include authors.html %}

          </div>
        </div>
      </div>
    </div>

    {% include footer.html %}

    <!-- js -->
    <script>
      loadAuthors("authors");
      loadRecentPosts("recentPosts");
    </script>
    {% if layout.scripts %}
    {% include {{layout.scripts}} %}
    {% endif %}
  </body>
</html>
