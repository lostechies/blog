<head>
  <link href="https://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="color-scheme" content="light dark">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/bulma.css"/>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/highlight.css"/>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/custom.css"/>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/font-awesome.min.css"/>

  <!-- Icons -->
  <link rel="shortcut icon" href="{{ site.baseurl }}/assets/images/favicon.ico">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="https://feeds.feedburner.com/LosTechies">

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

</head>
